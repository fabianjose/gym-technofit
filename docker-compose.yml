version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gym_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gymflow
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: gympassword
      TZ: America/Bogota  # Sincroniza la hora de la DB con Colombia
    # Ajuste para servidores de 1GB de RAM: limitamos el uso de memoria de MySQL
    command: --innodb-buffer-pool-size=64M --max-connections=50
    ports:
      - "3306:3306"
    volumes:
      - gymflow_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      - TZ=America/Bogota  # CRÍTICO: Para que el Cron de las 11:38 AM funcione en hora local
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: 512M
    volumes:
      - ./backend/uploads:/app/uploads 
      # PERSISTENCIA DE WHATSAPP: Mantiene la sesión iniciada tras reinicios
      - ./backend/.wwebjs_auth:/app/.wwebjs_auth
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    restart: always
    environment:
      - TZ=America/Bogota
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: gym_nginx
    restart: always
    environment:
      - TZ=America/Bogota
    ports:
      - "80:80"
    volumes:
      - ./gym_nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  gymflow_data: