version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gym_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gymflow
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: gympassword
    command: --innodb-buffer-pool-size=64M
    ports:
      - "3306:3306"
    volumes:
      - gymflow_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gym_backend
    restart: always
    depends_on:
      - db
    # --- CAMBIO AQUÍ: Usamos el archivo del servidor ---
    env_file:
      - ./backend/.env
    # --------------------------------------------------
    volumes:
      - ./backend/uploads:/app/uploads 
    expose:
      - "3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gym_frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: gym_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./gym_nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  gymflow_data: