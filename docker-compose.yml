version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: gymflow_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: gymflow
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: gympassword
    ports:
      - "3306:3306"
    volumes:
      - gymflow_data:/var/lib/mysql

volumes:
  gymflow_data:
